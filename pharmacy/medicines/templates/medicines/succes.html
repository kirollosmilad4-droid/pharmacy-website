{% extends 'medicines/base.html' %}

{% block content %}

<div style="
    max-width:500px;
    margin:40px auto;
    background:white;
    padding:25px;
    border-radius:15px;
    text-align:center;
">

    <h1 style="color:green;">
        ✅ تم الطلب بنجاح
    </h1>

    <p style="margin:15px 0;">
        شكراً لطلبك 🙏 سيتم التواصل معك قريباً
    </p>

    <!-- 💳 Payment Message -->
    {% if payment == "vodafone" %}
        <div style="
            background:#e8f5e9;
            padding:15px;
            border-radius:10px;
            margin-top:15px;
        ">
            <p style="color:green; font-weight:bold;">
                📱 قم بالتحويل على الرقم:
            </p>
            <p style="font-size:18px;">
                010XXXXXXXX
            </p>
        </div>
    {% else %}
        <p style="margin-top:15px;">
            💵 الدفع عند الاستلام
        </p>
    {% endif %}

    <a href="/" style="display:block; margin-top:20px;">
        <button>🏠 رجوع للرئيسية</button>
    </a>

</div>

{% endblock %}
