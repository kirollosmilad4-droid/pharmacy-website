{% extends 'medicines/base.html' %}

{% block content %}

<div style="max-width:400px; margin:auto; background:white; padding:20px; border-radius:15px; text-align:center;">

    <h2>إنشاء حساب</h2>

    <form method="POST">
        {% csrf_token %}
        
        <input type="text" name="username" placeholder="اسم المستخدم" style="width:100%; padding:10px;"><br><br>
        
        <input type="password" name="password" placeholder="كلمة المرور" style="width:100%; padding:10px;"><br><br>
        
        <button type="submit">تسجيل</button>
    </form>

    {% if error %}
    <p style="color:red;">{{ error }}</p>
    {% endif %}

</div>

{% endblock %}
